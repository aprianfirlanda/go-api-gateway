services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrator
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    environment:
      CONTROL_PLANE_ADDR: ":8081"
      CONTROL_PLANE_ADMIN_TOKEN: dev-admin-token
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      GATEWAY_ADDR: ":8080"
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_TIMEOUT: 2s
      RUNTIME_STATE_BACKEND: redis
      RUNTIME_STATE_ENV: prod_local
      RUNTIME_STATE_VERSION: v1
      CONFIG_RELOAD_INTERVAL: 5s
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
